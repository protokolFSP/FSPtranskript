name: Transcribe IA (DE, medium) FSP sources -> transcripts (parallel)

on:
  workflow_dispatch:
    inputs:
      ia_identifier:
        description: "Internet Archive identifier (tek-kaynak manuel kullanım için)"
        required: true
        default: "FSPneu"
        type: string
      out_dir:
        description: "Çıktı klasörü (tek-kaynak manuel kullanım için)"
        required: true
        default: "transcripts/FSPab26"
        type: string
      batch_size:
        description: "Bu run'da toplam kaç dosya işlensin"
        required: true
        default: "20"
        type: string
      max_parallel:
        description: "Aynı anda kaç job koşsun"
        required: true
        default: "6"
        type: string
      match:
        description: "Opsiyonel filtre (substring). Boş=hepsi"
        required: false
        default: ""
        type: string
      sources_json:
        description: "Opsiyonel çoklu kaynak listesi JSON. Boşsa schedule default'u veya tek-kaynak input'ları kullanılır."
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: ia-transcribe-fsp-sources
  cancel-in-progress: false

env:
  IA_IDENTIFIER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ia_identifier || 'FSPneu' }}
  OUT_DIR_DEFAULT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.out_dir || 'transcripts/FSPab26' }}
  MODEL: medium
  LANGUAGE: de
  DEFAULT_SOURCES_JSON: >-
    [
      {
        "identifier": "FSPneu",
        "out_dir": "transcripts/FSPab26",
        "match": ""
      },
      {
        "identifier": "sprunggelenk-distorsion-frau-florin-krone-27-05-25_20250726",
        "out_dir": "transcripts/Thuringen",
        "match": ""
      }
    ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      count: ${{ steps.pick.outputs.count }}
      max_parallel: ${{ steps.pick.outputs.max_parallel }}

    steps:
      - uses: actions/checkout@v4

      - name: Build transcribe tool
        run: |
          mkdir -p tooling
          cat > tooling/transcribe_ia_whisper.py <<'PY'
          from __future__ import annotations

          import argparse
          import json
          import sys
          import tempfile
          from dataclasses import dataclass
          from pathlib import Path
          from typing import List, Tuple
          from urllib.parse import quote

          import requests
          from tqdm import tqdm

          IA_METADATA_URL = "https://archive.org/metadata/{identifier}"
          IA_DOWNLOAD_URL = "https://archive.org/download/{identifier}/{filename}"
          AUDIO_EXTENSIONS = {".m4a", ".mp3"}

          @dataclass(frozen=True)
          class Segment:
              start: float
              end: float
              text: str

          def eprint(*args: object) -> None:
              print(*args, file=sys.stderr)

          def fetch_item_metadata(identifier: str, timeout_s: int = 30) -> dict:
              url = IA_METADATA_URL.format(identifier=identifier)
              resp = requests.get(url, timeout=timeout_s)
              resp.raise_for_status()
              return resp.json()

          def extract_audio_filenames(metadata: dict) -> List[str]:
              files = metadata.get("files", [])
              if isinstance(files, dict):
                  files = list(files.values())

              names: List[str] = []
              for entry in files:
                  if not isinstance(entry, dict):
                      continue
                  name = entry.get("name") or entry.get("file") or entry.get("filename")
                  if not isinstance(name, str):
                      continue
                  suffix = Path(name).suffix.lower()
                  if suffix in AUDIO_EXTENSIONS:
                      names.append(name)

              names.sort(key=lambda s: s.casefold())
              return names

          def filter_by_match(files: List[str], match: str) -> List[str]:
              if not match:
                  return files
              m = match.casefold()
              return [f for f in files if m in f.casefold()]

          def build_output_paths(out_dir: Path, remote_filename: str) -> Tuple[Path, Path]:
              base = Path(Path(remote_filename).name).with_suffix("").name
              return out_dir / f"{base}.txt", out_dir / f"{base}.srt"

          def missing_files(files: List[str], out_dir: Path) -> List[str]:
              missing: List[str] = []
              for remote_filename in files:
                  txt_path, srt_path = build_output_paths(out_dir, remote_filename)
                  if not (txt_path.exists() and srt_path.exists()):
                      missing.append(remote_filename)
              return missing

          def download_one_file(identifier: str, remote_filename: str, dest_path: Path, timeout_s: int = 60) -> None:
              safe_remote = quote(remote_filename)
              url = IA_DOWNLOAD_URL.format(identifier=identifier, filename=safe_remote)

              with requests.get(url, stream=True, timeout=timeout_s) as resp:
                  resp.raise_for_status()
                  total = int(resp.headers.get("Content-Length", "0") or "0")
                  dest_path.parent.mkdir(parents=True, exist_ok=True)

                  with open(dest_path, "wb") as file_handle, tqdm(
                      total=total if total > 0 else None,
                      unit="B",
                      unit_scale=True,
                      desc="Downloading",
                      leave=False,
                  ) as pbar:
                      for chunk in resp.iter_content(chunk_size=1024 * 1024):
                          if chunk:
                              file_handle.write(chunk)
                              pbar.update(len(chunk))

          def format_srt_timestamp(seconds: float) -> str:
              ms = int(round(seconds * 1000.0))
              hours, ms = divmod(ms, 3600 * 1000)
              minutes, ms = divmod(ms, 60 * 1000)
              secs, ms = divmod(ms, 1000)
              return f"{hours:02d}:{minutes:02d}:{secs:02d},{ms:03d}"

          def write_txt(out_path: Path, segments: List[Segment]) -> None:
              out_path.parent.mkdir(parents=True, exist_ok=True)
              text = "\n".join(seg.text.strip() for seg in segments if seg.text.strip())
              out_path.write_text(text + ("\n" if text else ""), encoding="utf-8")

          def write_srt(out_path: Path, segments: List[Segment]) -> None:
              out_path.parent.mkdir(parents=True, exist_ok=True)

              lines: List[str] = []
              idx = 1
              for seg in segments:
                  text = seg.text.strip()
                  if not text:
                      continue

                  start = seg.start
                  end = seg.end if seg.end > seg.start else seg.start + 0.001

                  lines.append(str(idx))
                  lines.append(f"{format_srt_timestamp(start)} --> {format_srt_timestamp(end)}")
                  lines.append(text)
                  lines.append("")
                  idx += 1

              out_path.write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")

          def resolve_device(device_arg: str) -> str:
              return device_arg if device_arg != "auto" else "cpu"

          def default_compute_type(device: str, compute_type_arg: str) -> str:
              if compute_type_arg != "auto":
                  return compute_type_arg
              return "float16" if device == "cuda" else "int8"

          def transcribe_with_faster_whisper(
              audio_path: Path,
              model_name: str,
              language: str,
              device: str,
              compute_type: str,
              beam_size: int,
              vad_filter: bool,
          ) -> List[Segment]:
              from faster_whisper import WhisperModel

              model = WhisperModel(model_name, device=device, compute_type=compute_type)
              seg_iter, info = model.transcribe(
                  str(audio_path),
                  language=language,
                  task="transcribe",
                  beam_size=beam_size,
                  vad_filter=vad_filter,
              )

              eprint(
                  f"Detected language: {getattr(info, 'language', 'unknown')} | "
                  f"Duration: {getattr(info, 'duration', 'unknown')}"
              )

              return [Segment(float(seg.start), float(seg.end), str(seg.text)) for seg in seg_iter]

          def main() -> int:
              parser = argparse.ArgumentParser()
              parser.add_argument("--identifier", required=True)
              parser.add_argument("--out-dir", required=True)
              parser.add_argument("--model", default="medium")
              parser.add_argument("--language", default="de")
              parser.add_argument("--device", default="auto", choices=["auto", "cpu", "cuda"])
              parser.add_argument("--compute-type", default="auto")
              parser.add_argument("--beam-size", type=int, default=1)
              parser.add_argument("--vad-filter", action="store_true")
              parser.add_argument("--file", default=None)
              parser.add_argument("--match", default="")
              parser.add_argument("--list-missing-json", action="store_true")
              args = parser.parse_args()

              out_dir = Path(args.out_dir).resolve()
              out_dir.mkdir(parents=True, exist_ok=True)

              metadata = fetch_item_metadata(args.identifier)
              all_audio = filter_by_match(extract_audio_filenames(metadata), args.match)

              if args.list_missing_json:
                  sys.stdout.write(json.dumps(missing_files(all_audio, out_dir), ensure_ascii=False))
                  sys.stdout.flush()
                  return 0

              if not args.file:
                  eprint("Error: --file is required for transcription runs.")
                  return 2

              device = resolve_device(args.device)
              compute_type = default_compute_type(device, args.compute_type)

              remote_filename = args.file
              txt_path, srt_path = build_output_paths(out_dir, remote_filename)

              with tempfile.TemporaryDirectory(prefix="ia_whisper_") as tmpdir:
                  local_audio = Path(tmpdir) / Path(remote_filename).name
                  download_one_file(args.identifier, remote_filename, local_audio)

                  segments = transcribe_with_faster_whisper(
                      audio_path=local_audio,
                      model_name=args.model,
                      language=args.language,
                      device=device,
                      compute_type=compute_type,
                      beam_size=args.beam_size,
                      vad_filter=args.vad_filter,
                  )

                  write_txt(txt_path, segments)
                  write_srt(srt_path, segments)

              return 0

          if __name__ == "__main__":
              raise SystemExit(main())
          PY

      - name: Upload tool for matrix jobs
        uses: actions/upload-artifact@v4
        with:
          name: tooling
          path: tooling/transcribe_ia_whisper.py
          if-no-files-found: error

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps for listing
        run: |
          python -m pip install -U pip
          pip install requests tqdm

      - id: pick
        name: Pick next missing files across all sources
        env:
          BATCH_SIZE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.batch_size || '20' }}
          MAX_PARALLEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_parallel || '6' }}
          MATCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.match || '' }}
          SOURCES_JSON_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sources_json || '' }}
          DEFAULT_SOURCES_JSON: ${{ env.DEFAULT_SOURCES_JSON }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          batch_size = int(os.environ["BATCH_SIZE"])
          max_parallel = int(os.environ["MAX_PARALLEL"])
          sources_json_input = (os.environ.get("SOURCES_JSON_INPUT") or "").strip()
          single_match = (os.environ.get("MATCH") or "").strip()

          if sources_json_input:
              sources = json.loads(sources_json_input)
          elif event_name == "schedule":
              sources = json.loads(os.environ["DEFAULT_SOURCES_JSON"])
          else:
              sources = [{
                  "identifier": os.environ["IA_IDENTIFIER"],
                  "out_dir": os.environ["OUT_DIR_DEFAULT"],
                  "match": single_match,
              }]

          matrix = []
          idx = 0

          for source in sources:
              identifier = source["identifier"]
              out_dir = source["out_dir"]
              match = (source.get("match") or "").strip()

              cmd = [
                  sys.executable,
                  "tooling/transcribe_ia_whisper.py",
                  "--identifier", identifier,
                  "--out-dir", out_dir,
                  "--list-missing-json",
              ]
              if match:
                  cmd += ["--match", match]

              missing = json.loads(subprocess.check_output(cmd).decode("utf-8"))

              for remote_file in missing:
                  matrix.append({
                      "idx": idx,
                      "identifier": identifier,
                      "out_dir": out_dir,
                      "file": remote_file,
                  })
                  idx += 1

          matrix = matrix[:batch_size]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
              fh.write(f"count={len(matrix)}\n")
              fh.write(f"max_parallel={max_parallel}\n")

          print("Picked:", json.dumps(matrix, ensure_ascii=False, indent=2))
          PY

  transcribe:
    needs: prepare
    if: ${{ needs.prepare.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.prepare.outputs.max_parallel) }}
      matrix:
        item: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Download tool
        uses: actions/download-artifact@v4
        with:
          name: tooling
          path: tooling

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache model downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/whisper
          key: whisper-cache-${{ runner.os }}-${{ env.MODEL }}-v1
          restore-keys: |
            whisper-cache-${{ runner.os }}-

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          pip install faster-whisper requests tqdm

      - name: Transcribe one file
        env:
          IDENTIFIER: ${{ matrix.item.identifier }}
          OUT_DIR: ${{ matrix.item.out_dir }}
          FILE: ${{ matrix.item.file }}
        run: |
          python tooling/transcribe_ia_whisper.py \
            --identifier "$IDENTIFIER" \
            --out-dir "$OUT_DIR" \
            --file "$FILE" \
            --model "$MODEL" \
            --language "$LANGUAGE" \
            --device "cpu" \
            --compute-type "int8" \
            --beam-size 1 \
            --vad-filter

      - name: Copy outputs to artifact folder
        env:
          OUT_DIR: ${{ matrix.item.out_dir }}
          FILE: ${{ matrix.item.file }}
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          out_dir = Path(os.environ["OUT_DIR"])
          remote_file = os.environ["FILE"]
          base = Path(remote_file).name
          base = Path(base).with_suffix("").name

          artifact_dir = Path("artifact_out") / out_dir
          artifact_dir.mkdir(parents=True, exist_ok=True)

          for ext in (".txt", ".srt"):
              src = out_dir / f"{base}{ext}"
              if src.exists():
                  dst = artifact_dir / src.name
                  shutil.copy2(src, dst)
          PY

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: transcripts-${{ matrix.item.idx }}
          path: artifact_out/**

  merge_and_push:
    needs: [prepare, transcribe]
    if: ${{ needs.prepare.outputs.count != '0' && always() }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Download all transcript artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge transcripts into repo
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            rel="$(python - "$file" <<'PY'
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          parts = path.parts

          try:
              idx = parts.index("artifact_out")
          except ValueError:
              raise SystemExit(1)

          print(Path(*parts[idx + 1:]).as_posix())
          PY
            )"

            if [ -z "$rel" ]; then
              echo "Skipping empty rel for $file"
              continue
            fi

            mkdir -p "$(dirname "$rel")"

            src_real="$(realpath "$file")"
            dst_real="$(realpath -m "$rel")"

            if [ "$src_real" = "$dst_real" ]; then
              echo "Skipping same file: $file"
              continue
            fi

            cp -f "$file" "$rel"
            echo "Merged: $rel"
          done < <(
            find artifacts -type f \( -name "*.txt" -o -name "*.srt" \) -print0
          )

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          retry() {
            local n=0
            local max=5
            while true; do
              if "$@"; then
                return 0
              fi
              n=$((n + 1))
              if [ "$n" -ge "$max" ]; then
                return 1
              fi
              sleep $((n * 10))
            done
          }

          git add transcripts/
          git commit -m "Add DE(medium) transcripts for FSP sources" || exit 0
          retry git fetch origin "${GITHUB_REF_NAME}"
          retry git rebase "origin/${GITHUB_REF_NAME}"
          retry git push origin "HEAD:${GITHUB_REF_NAME}"
